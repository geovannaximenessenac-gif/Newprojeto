<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 9</title>
</head>

<body>
    <h1>Digite seus dados</h1>

    Nome: <input type="text" id="Nome">
    Idade: <input type="number" id="Idade">

    <button onclick="mostrarNome()">Mostrar Nome</button>

    <p id="resultado"></p>

    <script>
        const NomeFixo = "SCI - Sistema Contralador de Insumos";
        function mostrarNome() {
            let Nome = document.getElementById("Nome").value;
            let Idade = document.getElementById("Idade").value;



            document.getElementById("resultado").innerText = "Olá "+Nome+" você tem "+Idade+" anos, seja bem vinda ao "+NomeFixo;

        }
    </script>
</body>

</html>
