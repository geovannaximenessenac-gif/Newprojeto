<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 8</title>
</head>
<body> 
    <h1>Soma de dois números</h1>
    <label for="">Digite o primeiro número:</label>
    <input type="number" id="número1">

    <label for="">Digite o segundo número:</label>
    <input type="number" id="número2">

    <button onclick="somar()">somar</button>

    <p id="resultado"></p>

    <script>
        function somar() {
            let numero1 = Number(document.getElementById("número1").value);
            let numero2 = Number(document.getElementById("número2").value);
            let números = numero1 + numero2

            document.getElementById("resultado").innerHTML = "O resultado é:" + números;
        }
</script>
</body>
</html>
